<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        
        <title>Site Simples para Aula</title>

        <style>
            /* CSS da pagina*/

body {
    font-family: Arial, sans-serif;
    background-color: #f1eaf1;
    color: #333;
    margin: 0;
    padding: 0;
}

header {
    background-color: #02011d;
    color: rgb(80, 130, 221);
    text-align: center;
    padding: 30px;

}

main {
    width: 80%;
    margin: 20px auto;
}

section {
    background-color: rgb(70, 141, 207);
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 20px;
}

h2 {
    color: #4f46e5;
}

a {
    display: inline-block;
    background-color: #4f46e5;
    color: white;
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 6px;
}

footer {
    background-color: #222;
    color: white;
    text-align: center;
    padding: 15px;
}
        </style>
    </head>
    
    <body>
        <h1>Menu Primeiro Site</h1>
       <P>Exemplo simples de HTML e CSS </P>
    <main>
        <section>
            <h2>O que é HTML?</h2>
            <p>
                HTML é a linguagem usada para criar a estrutura de um site.
                Com ela, colocamos títulos, textos, imagens, links e outras partes da página
            </p>
        </section>
        
        <section>        
            <h2>Exemplo de Link</h2>
            <p>Clique no botão:</p>
            <a href="https://www.youtube.com/watch?v=Fhy-5CtVkiM" target="_blank" >Saiba mais</a>
        </section>
    </main>   
    <footer>
        <p>Site criado para fins educativos</p>
    </footer> 
    </body>
</html>
